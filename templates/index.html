{% extends "layout.html" %}

{% block title %}{{ header }}{% endblock %}

{% block content %}
    <section class="intro">
        <p>{{ content }}</p>
    </section>

    {% if images %}
    <section class="gallery">
        <h2>Our Creations</h2>
        <div class="gallery-grid">
            {% for image in images %}
            <div class="gallery-item">
                <img src="{{ url_for('static', filename='images/' + image) }}" alt="Bakery Treat">
            </div>
            {% endfor %}
        </div>
    </section>
    {% endif %}
{% endblock %}
