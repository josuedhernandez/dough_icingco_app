{% extends "layout.html" %}
{% block title %}{{ header }}{% endblock %}

{% block content %}
    <section class="intro">
        <p>{{ content }}</p>
    </section>

    <section class="products">
        <div class="gallery-grid">
            {% for item in items %}
            <div class="product-card">
                <h3>{{ item.name }}</h3>
                <p>{{ item.description }}</p>
                <span class="tag {{ item.tag | lower | replace(' ', '-') }}">{{ item.tag }}</span>
            </div>
            {% endfor %}
        </div>
    </section>
{% endblock %}
